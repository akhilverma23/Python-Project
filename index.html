<!DOCTYPE html>
<html>
<head>
    <title>GIF Grabber 🔥</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>GIF Grabber 😎</h1>

    <input type="text" id="searchBox" placeholder="Enter keyword...">
    <button onclick="getGIF()">Search</button>

    <div id="buttons">
        <button onclick="quickSearch('meme')">😂 Meme</button>
        <button onclick="quickSearch('cat')">🐱 Cat</button>
        <button onclick="quickSearch('cool')">😎 Cool</button>
    </div>

    <div id="gifContainer"></div>

    <button onclick="saveFavorite()">❤️ Save</button>
    <button onclick="viewFavorites()">📂 Favorites</button>

    <script src="script.js"></script>
</body>
</html>
